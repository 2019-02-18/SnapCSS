<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapCSS Settings</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="options">
    <header class="options-header">
      <div class="header-brand">
        <img src="/icon/icon-48.png" alt="SnapCSS" class="header-icon" width="36" height="36" />
        <div>
          <h1 data-i18n="settingsTitle"></h1>
          <p class="header-tagline" data-i18n="popupTagline"></p>
        </div>
      </div>
    </header>

    <section class="setting-group">
      <h2 data-i18n="copyFormat"></h2>
      <label class="radio-option">
        <input type="radio" name="copyFormat" value="css" checked />
        <span data-i18n="formatCSS"></span>
        <code>font-size: 16px;</code>
      </label>
      <label class="radio-option">
        <input type="radio" name="copyFormat" value="css-variables" />
        <span data-i18n="formatCSSVars"></span>
        <code>--font-size: 16px;</code>
      </label>
      <label class="radio-option">
        <input type="radio" name="copyFormat" value="minified" />
        <span data-i18n="formatMinified"></span>
        <code>font-size:16px;color:#333;</code>
      </label>
    </section>

    <section class="setting-group">
      <h2 data-i18n="theme"></h2>
      <select id="theme-select">
        <option value="system" data-i18n="themeSystem"></option>
        <option value="light" data-i18n="themeLight"></option>
        <option value="dark" data-i18n="themeDark"></option>
      </select>
    </section>

    <section class="setting-group">
      <h2 data-i18n="language"></h2>
      <select id="lang-select">
        <option value="auto" data-i18n="langAuto"></option>
        <option value="en" data-i18n="langEn"></option>
        <option value="zh" data-i18n="langZh"></option>
      </select>
    </section>

    <section class="setting-group">
      <h2 data-i18n="shortcutKey"></h2>
      <p class="shortcut-info" data-i18n="shortcutKeyDesc"></p>
      <a href="#" id="shortcut-link" class="shortcut-link" data-i18n="shortcutKeyChange"></a>
    </section>

    <div class="save-status" id="save-status"></div>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
