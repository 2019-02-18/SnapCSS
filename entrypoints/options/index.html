<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapCSS Settings</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="options">
    <header class="options-header">
      <div class="header-brand">
        <img src="/icon/icon-48.png" alt="SnapCSS" class="header-icon" width="36" height="36" />
        <div>
          <h1 data-i18n="settingsTitle"></h1>
          <p class="header-tagline" data-i18n="popupTagline"></p>
        </div>
      </div>
    </header>

    <section class="setting-group">
      <h2 data-i18n="copyFormat"></h2>
      <label class="radio-option">
        <input type="radio" name="copyFormat" value="css" checked />
        <span data-i18n="formatCSS"></span>
        <code>font-size: 16px;</code>
      </label>
      <label class="radio-option">
        <input type="radio" name="copyFormat" value="css-variables" />
        <span data-i18n="formatCSSVars"></span>
        <code>--font-size: 16px;</code>
      </label>
      <label class="radio-option">
        <input type="radio" name="copyFormat" value="minified" />
        <span data-i18n="formatMinified"></span>
        <code>font-size:16px;color:#333;</code>
      </label>
    </section>

    <section class="setting-group">
      <h2 data-i18n="theme"></h2>
      <select id="theme-select">
        <option value="system" data-i18n="themeSystem"></option>
        <option value="light" data-i18n="themeLight"></option>
        <option value="dark" data-i18n="themeDark"></option>
      </select>
    </section>

    <section class="setting-group">
      <h2 data-i18n="language"></h2>
      <select id="lang-select">
        <option value="auto" data-i18n="langAuto"></option>
        <option value="en" data-i18n="langEn"></option>
        <option value="zh" data-i18n="langZh"></option>
      </select>
    </section>

    <section class="setting-group">
      <h2 data-i18n="shortcutKey"></h2>
      <p class="shortcut-info" data-i18n="shortcutKeyDesc"></p>
      <a href="#" id="shortcut-link" class="shortcut-link" data-i18n="shortcutKeyChange"></a>
    </section>

    <section class="setting-group ai-settings">
      <h2 data-i18n="aiSettings"></h2>
      <div class="ai-field">
        <label data-i18n="aiProvider"></label>
        <select id="ai-provider">
          <option value="openai">OpenAI</option>
          <option value="claude">Claude</option>
          <option value="gemini">Gemini</option>
          <option value="deepseek">DeepSeek</option>
          <option value="moonshot">Moonshot (Kimi)</option>
          <option value="qwen" data-i18n="aiQwen"></option>
          <option value="custom" data-i18n="aiCustom"></option>
        </select>
      </div>
      <div class="ai-field">
        <label data-i18n="aiApiKey"></label>
        <div class="ai-key-wrapper">
          <input type="password" id="ai-api-key" class="ai-input" placeholder="sk-..." autocomplete="off" />
          <button type="button" id="ai-key-toggle" class="ai-key-toggle" title="Show/Hide">👁</button>
        </div>
      </div>
      <div class="ai-field" id="ai-endpoint-group">
        <label data-i18n="aiEndpoint"></label>
        <input type="text" id="ai-endpoint" class="ai-input" placeholder="https://api.openai.com" />
      </div>
      <div class="ai-field">
        <label data-i18n="aiModel"></label>
        <input type="text" id="ai-model" class="ai-input" placeholder="gpt-4o-mini" />
      </div>
      <div class="ai-field ai-actions">
        <button type="button" id="ai-test-btn" class="ai-test-btn" data-i18n="aiTestConnection"></button>
        <button type="button" id="ai-save-btn" class="ai-save-btn" data-i18n="aiSave"></button>
      </div>
      <div class="ai-status" id="ai-status"></div>
      <p class="ai-privacy-note" data-i18n="aiPrivacyNote"></p>
      <div class="ai-quickstart">
        <div class="ai-quickstart-title" data-i18n="aiQuickStart"></div>
        <div class="ai-quickstart-links">
          <a href="#" class="ai-quickstart-link" data-provider="gemini">
            <span class="ai-qs-name">Google Gemini</span>
            <span class="ai-qs-desc" data-i18n="aiGeminiFree"></span>
          </a>
          <a href="#" class="ai-quickstart-link" data-provider="deepseek">
            <span class="ai-qs-name">DeepSeek</span>
            <span class="ai-qs-desc" data-i18n="aiDeepseekFree"></span>
          </a>
        </div>
      </div>
    </section>

    <div class="save-status" id="save-status"></div>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
