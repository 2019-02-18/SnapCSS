<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapCSS</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="popup">
    <header class="popup-header">
      <div class="logo-row">
        <img src="/icon/icon-48.png" alt="SnapCSS" class="logo-icon" width="28" height="28" />
        <h1>SnapCSS</h1>
      </div>
      <p class="tagline" data-i18n="popupTagline"></p>
    </header>

    <div class="toggle-section">
      <button id="toggle-btn" class="toggle-btn" type="button">
        <span class="toggle-icon" id="toggle-icon">▶</span>
        <span class="toggle-label" id="toggle-label" data-i18n="startInspecting"></span>
      </button>
    </div>

    <div class="shortcut-hint" id="shortcut-hint">
      <span data-i18n="shortcutHintLabel"></span>
      <kbd>Alt</kbd> + <kbd>C</kbd>
    </div>

    <div class="quick-settings">
      <div class="setting-row">
        <span class="setting-label" data-i18n="copyFormat"></span>
        <select id="format-select" class="mini-select">
          <option value="css" data-i18n="formatCSS"></option>
          <option value="css-variables" data-i18n="formatCSSVars"></option>
          <option value="minified" data-i18n="formatMinified"></option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label" data-i18n="theme"></span>
        <select id="theme-select" class="mini-select">
          <option value="system" data-i18n="themeSystem"></option>
          <option value="light" data-i18n="themeLight"></option>
          <option value="dark" data-i18n="themeDark"></option>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label" data-i18n="language"></span>
        <select id="lang-select" class="mini-select">
          <option value="auto" data-i18n="langAuto"></option>
          <option value="en" data-i18n="langEn"></option>
          <option value="zh" data-i18n="langZh"></option>
        </select>
      </div>
    </div>

    <div class="ai-status-section" id="ai-status-section">
      <div class="ai-status-badge" id="ai-status-badge">
        <span class="ai-dot"></span>
        <span id="ai-status-text" data-i18n="aiNotReady"></span>
      </div>
    </div>

    <footer class="popup-footer">
      <a href="#" id="options-link" data-i18n="settings"></a>
      <span class="version" id="version-label"></span>
    </footer>
  </div>
  <script src="./main.ts" type="module"></script>
</body>
</html>
